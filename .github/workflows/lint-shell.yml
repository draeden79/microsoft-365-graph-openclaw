name: lint-shell

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          scripts="$(find scripts -type f -name '*.sh' | tr '\n' ' ')"
          if [ -n "$scripts" ]; then
            shellcheck $scripts
          else
            echo "No shell scripts found."
          fi
